<div id="view-budget" class="view-module max-w-6xl mx-auto space-y-6 pb-20 hidden">
    <header class="mb-8 hidden md:block">
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Budgeting</h1>
        <p class="text-slate-500 mt-1">Atur limit pengeluaran bulanan per kategori agar keuangan tetap sehat.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Form Set Budget -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 relative overflow-hidden">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-gradient-to-br from-indigo-100 to-violet-100 rounded-full opacity-60 pointer-events-none"></div>
                
                <div class="flex items-center gap-3 mb-5 relative z-10">
                    <div class="p-2.5 bg-gradient-to-br from-indigo-500 to-violet-600 text-white rounded-xl shadow-lg shadow-indigo-200/50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-base font-bold text-slate-800">Set Limit Budget</h3>
                        <p class="text-xs text-slate-400">Pilih kategori dan tentukan limit</p>
                    </div>
                </div>

                <form onsubmit="submitBudget(event)" class="space-y-4">
                    <div>
                        <label for="budget-category" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Kategori Pengeluaran</label>
                        <div class="select-wrapper select-dark-arrow">
                            <select id="budget-category" required class="w-full rounded-xl border-slate-200 border p-3 pr-10 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white shadow-sm"></select>
                        </div>
                    </div>
                    <div>
                        <label for="budget-amount" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nominal Limit (Bulanan)</label>
                        <input type="text" id="budget-amount" placeholder="0" required oninput="formatCurrencyInput(this)" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm">
                    </div>
                    <button type="submit" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-white font-semibold transition-all bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 shadow-lg shadow-indigo-200/50 mt-2 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Simpan Budget
                    </button>
                </form>
            </div>
        </div>

        <!-- Budget List & Progress -->
        <div class="lg:col-span-2 flex flex-col space-y-6">
            <!-- Summary Hero -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl shadow-xl p-8 text-white relative overflow-hidden group">
                <div class="absolute inset-0 opacity-5 hero-bg-pattern"></div>
                <div class="relative z-10">
                    <h3 class="text-indigo-200 font-semibold tracking-wide text-sm mb-4">Ringkasan Budget Bulan Ini</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-slate-400 mb-1">Total Budget Dialokasikan</p>
                            <p id="budget-total-allocated" class="text-2xl font-bold tracking-tight text-white">0</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 mb-1">Total Pengeluaran (Kategori Ter-budget)</p>
                            <p id="budget-total-spent" class="text-2xl font-bold tracking-tight text-rose-400">0</p>
                        </div>
                    </div>
                    <div class="mt-5">
                        <div class="flex justify-between text-xs mb-1.5">
                            <span class="text-slate-300">Penggunaan Keseluruhan</span>
                            <span id="budget-total-pct" class="font-bold text-white">0%</span>
                        </div>
                        <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
                            <div id="budget-total-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-1000 w-0"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- List Kategori -->
            <div class="flex-1 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-lg font-bold text-slate-800">Daftar Budget Anda</h3>
                    <div class="flex items-center gap-2">
                        <select id="budget-month-filter" title="Filter Bulan" onchange="renderBudget()" class="text-xs bg-white border border-slate-200 text-slate-600 rounded-full px-3 py-1 font-semibold outline-none focus:ring-2 focus:ring-indigo-500"></select>
                    </div>
                </div>
                <div id="list-budgets" class="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto pr-2 custom-scrollbar max-h-[600px]">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </div>
</div>
