    <!-- API BRIDGE (GOOGLE COMPATIBILITY) -->

    <script>
        // --- UNIVERSAL API BRIDGE (FIXED) ---
        window.google = {
            script: {
                run: (function() {
                    let _successHandler = null;
                    let _failureHandler = null;

                    function createRunner() {
                        return new Proxy({}, {
                            get: (target, prop) => {
                                // Handle chaining
                                if (prop === 'withSuccessHandler') {
                                    return function(h) { _successHandler = h; return createRunner(); };
                                }
                                if (prop === 'withFailureHandler') {
                                    return function(h) { _failureHandler = h; return createRunner(); };
                                }

                                // Handle actual function calls
                                return async function(...args) {
                                    try {
                                        const response = await fetch(`/api/${prop}`, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify(args)
                                        });
                                        const result = await response.json();
                                        if (_successHandler) _successHandler(result);
                                        return result;
                                    } catch (err) {
                                        console.error(`API Error (${prop}):`, err);
                                        if (_failureHandler) _failureHandler(err);
                                    }
                                };
                            }
                        });
                    }

                    return createRunner();
                })()
            }
        };
    </script>

    <script>
        function syncFromGoogleSheets(event) {
            let url = localStorage.getItem('gas_api_url');
            if (!url) {
                url = prompt("Masukkan URL Web App Google Apps Script Anda (diawali dengan https://script.google.com/macros/...):");
                if (!url) return;
                localStorage.setItem('gas_api_url', url);
            } else {
                if (!confirm("Mulai sinkronisasi data dari Google Sheets sekarang? (Proses ini memakan waktu beberapa detik)")) return;
            }
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Wait..`;
            btn.disabled = true;

            google.script.run
                .withSuccessHandler(res => {
                    alert(res.message || "Sinkronisasi berhasil! Halaman akan dimuat ulang.");
                    location.reload();
                })
                .withFailureHandler(err => {
                    alert("Gagal Sinkronisasi: Pastikan URL Web App benar dan bisa diakses. Pesan: " + err);
                    localStorage.removeItem('gas_api_url'); // Reset jika gagal
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                })
                .syncFromGAS(url);
        }
    </script>
