<!-- MODULE: SUBSCRIPTIONS -->
<div id="view-subscription" class="view-module max-w-6xl mx-auto space-y-6 pb-20 hidden">
    <header class="mb-8 hidden md:block">
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Subscription Manager</h1>
        <p class="text-slate-500 mt-1">Kelola langganan digital dan tagihan rutin Anda di satu tempat.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- FORM COLUMN -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sticky top-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2.5 bg-indigo-100 text-indigo-600 rounded-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-base font-bold text-slate-800">Tambah Langganan</h3>
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Recurring Payment</p>
                    </div>
                </div>

                <form onsubmit="submitSubscription(event)" class="space-y-4">
                    <input type="hidden" id="sub-id">
                    <div>
                        <label for="sub-name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nama Layanan</label>
                        <input type="text" id="sub-name" placeholder="Contoh: Netflix, Spotify" required class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                    </div>
                    <div>
                        <label for="sub-email" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Email / Akun</label>
                        <input type="email" id="sub-email" placeholder="contoh@email.com" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="sub-amount" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nominal</label>
                            <input type="text" id="sub-amount" placeholder="0" required oninput="formatCurrencyInput(this)" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                        </div>
                        <div>
                            <label for="sub-cycle" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Siklus</label>
                            <select id="sub-cycle" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white shadow-sm dark-arrow">
                                <option value="monthly">Bulanan</option>
                                <option value="yearly">Tahunan</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="sub-due-date" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Tanggal Tagihan</label>
                            <input type="date" id="sub-due-date" required class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                        </div>
                        <div>
                            <label for="sub-category" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Kategori</label>
                            <select id="sub-category" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white shadow-sm dark-arrow"></select>
                        </div>
                    </div>
                    <div>
                        <label for="sub-bank" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Metode Pembayaran</label>
                        <select id="sub-bank" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white shadow-sm dark-arrow"></select>
                    </div>
                    <div class="pt-2 flex gap-2">
                        <button type="submit" id="sub-submit-btn" class="flex-1 py-3 px-4 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 transition-all shadow-md shadow-indigo-200/50 text-sm uppercase tracking-wider">Simpan</button>
                        <button type="button" id="sub-cancel-btn" onclick="resetSubscriptionForm()" class="hidden py-3 px-4 rounded-xl border border-slate-200 text-slate-500 font-bold hover:bg-slate-50 transition-all text-sm uppercase tracking-wider">Batal</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- LIST COLUMN -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Summary Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl p-5 text-white shadow-lg shadow-indigo-200/50">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-100 opacity-80">Estimasi Tagihan Bulan Ini</p>
                    <h3 id="sub-total-monthly" class="text-2xl font-extrabold mt-1">Rp 0</h3>
                </div>
                <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total Langganan Aktif</p>
                    <h3 id="sub-count-active" class="text-2xl font-extrabold text-slate-800 mt-1">0</h3>
                </div>
            </div>

            <!-- Main List -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-slate-800">Daftar Langganan</h3>
                    <div class="flex gap-2">
                        <button onclick="renderSubscriptions('all')" class="text-[10px] font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200">Semua</button>
                        <button onclick="renderSubscriptions('due')" class="text-[10px] font-bold px-3 py-1.5 rounded-full bg-amber-50 text-amber-600 border border-amber-100 hover:bg-amber-100">Akan Datang</button>
                    </div>
                </div>
                
                <div id="list-subscriptions" class="space-y-4">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </div>
</div>
