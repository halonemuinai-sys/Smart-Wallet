<!-- MODULE: PEMASUKAN -->
<div id="view-income" class="view-module max-w-6xl mx-auto space-y-6 pb-20 hidden">
    <header class="mb-8 hidden md:block">
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Pemasukan</h1>
        <p class="text-slate-500 mt-1">Catat semua sumber pemasukan Anda di sini.</p>
    </header>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- FORM CARD -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col">
                <div class="flex items-center gap-4 mb-6">
                    <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl border border-emerald-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-800 tracking-tight">Catat Pemasukan</h3>
                        <p class="text-xs text-slate-500 font-medium">Tambah data pemasukan baru</p>
                    </div>
                </div>
                
                <form onsubmit="submitTransaction(event, 'income')" class="space-y-4 flex-1 flex flex-col">
                    <div>
                        <label for="inc-amount" class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Nominal</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">Rp</span>
                            <input type="text" id="inc-amount" title="Nominal Pemasukan" placeholder="0" required oninput="formatCurrencyInput(this)" class="w-full rounded-xl bg-slate-50 border border-slate-200 p-3 pl-10 text-sm text-slate-900 font-bold focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="inc-category" class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Kategori</label>
                            <div class="relative group">
                                <select id="inc-category" title="Kategori Pemasukan" class="w-full rounded-xl bg-slate-50 border border-slate-200 p-3 pr-10 text-sm text-slate-900 font-medium focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all appearance-none cursor-pointer"></select>
                            </div>
                        </div>
                        <div>
                            <label for="inc-bank" class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Akun Tujuan</label>
                            <div class="relative group">
                                <select id="inc-bank" title="Akun Bank Pemasukan" class="w-full rounded-xl bg-slate-50 border border-slate-200 p-3 pr-10 text-sm text-slate-900 font-medium focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all appearance-none cursor-pointer"></select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="inc-date" class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Tanggal</label>
                            <input type="date" id="inc-date" title="Tanggal Pemasukan" required class="w-full rounded-xl bg-slate-50 border border-slate-200 p-3 text-sm text-slate-900 font-medium focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all">
                        </div>
                        <div>
                            <label for="inc-desc" class="block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wider">Keterangan</label>
                            <input type="text" id="inc-desc" title="Keterangan Pemasukan" placeholder="Opsional..." class="w-full rounded-xl bg-slate-50 border border-slate-200 p-3 text-sm text-slate-900 font-medium focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all">
                        </div>
                    </div>
                    
                    <div class="mt-auto pt-4">
                        <button type="submit" class="w-full py-3.5 px-4 rounded-xl text-white font-bold transition-all bg-emerald-600 hover:bg-emerald-700 shadow-sm shadow-emerald-600/20 text-sm flex items-center justify-center gap-2 active:scale-[0.98]">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                            SIMPAN PEMASUKAN
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- HISTORY CARD -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 h-full flex flex-col">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <h3 class="text-lg font-semibold text-slate-800">Riwayat Pemasukan</h3>
                    <input type="text" onfocus="(this.type='month')" onblur="if(!this.value) this.type='text'" id="filter-inc-month" title="Filter Bulan Pemasukan" placeholder="Pilih Bulan" onchange="renderData()" class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 cursor-pointer">
                </div>
                <div id="list-income" class="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-1 max-h-[600px]"></div>
            </div>
        </div>
    </div>
</div>
