    async function submitTransfer(e) {
        e.preventDefault();
        const fromBank = document.getElementById('tf-from').value;
        const toBank = document.getElementById('tf-to').value;
        const isBuspos = document.getElementById('tf-buspos-mode')?.checked;
        const toBank2 = isBuspos ? document.getElementById('tf-to-2').value : null;
        let amount = cleanNumber(document.getElementById('tf-amount').value);
        const date = document.getElementById('tf-date').value;

        if (fromBank === toBank || (isBuspos && fromBank === toBank2)) {
            alert("Akun asal dan tujuan tidak boleh sama.");
            return;
        }
        if (isBuspos && toBank === toBank2) {
            alert("Akun Tujuan 1 dan Tujuan 2 tidak boleh sama.");
            return;
        }
        if (amount <= 0) {
            alert("Nominal transfer tidak valid.");
            return;
        }

        const fromBankObj = banks.find(b => b.id === fromBank);
        const toBankObj1 = banks.find(b => b.id === toBank);
        const toBankObj2 = isBuspos ? banks.find(b => b.id === toBank2) : null;
        const fromName = fromBankObj ? fromBankObj.name : 'rekening asal';

        // Split Amount if Buspos Mode
        const splitAmount = isBuspos ? Math.round(amount / 2) : amount;

        const createTransferPair = (toBObj, amt, suffix) => {
            const toName = toBObj ? toBObj.name : 'rekening tujuan';
            let actionLabel = 'Transfer';
            if (toBObj) {
                if (toBObj.account_type === 'cash' && fromBankObj && fromBankObj.account_type === 'bank') actionLabel = 'Tarik Tunai';
                else if (toBObj.account_type === 'ewallet' || toBObj.account_type === 'emoney') actionLabel = 'Top-Up';
                else if (toBObj.account_type === 'credit_card' || toBObj.account_type === 'paylater') actionLabel = 'Bayar Tagihan';
                else if (toBObj.account_type === 'bank' && fromBankObj && fromBankObj.account_type === 'cash') actionLabel = 'Setor Tunai';
            }
            const timestamp = Date.now() + suffix;
            return [
                {
                    id: timestamp.toString() + "_out",
                    type: 'expense',
                    category: 'Transfer Keluar',
                    amount: amt,
                    date: date,
                    description: `${actionLabel} ke ${toName}`,
                    bank: fromBank
                },
                {
                    id: timestamp.toString() + "_in",
                    type: 'income',
                    category: 'Transfer Masuk',
                    amount: amt,
                    date: date,
                    description: `${actionLabel} dari ${fromName}`,
                    bank: toBObj.id
                }
            ];
        };

        const newTrx = [];
        const pair1 = createTransferPair(toBankObj1, splitAmount, 1);
        newTrx.push(pair1[0], pair1[1]);

        if (isBuspos && toBankObj2) {
            const pair2 = createTransferPair(toBankObj2, amount - splitAmount, 2); // handles odd numbers safely
            newTrx.push(pair2[0], pair2[1]);
        }

        transactions.unshift(...newTrx);
        transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderData();

        // Reset Form
        document.getElementById('tf-amount').value = '';
        document.getElementById('tf-from').value = '';
        document.getElementById('tf-to').value = '';
        if (isBuspos) {
            document.getElementById('tf-buspos-mode').click(); // Untoggle
        }

        showSyncing(true);

        // Save to backend
        for (const trx of newTrx) {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                await new Promise(resolve => {
                    google.script.run.withSuccessHandler(resolve).addTransactionData(trx);
                });
            } else if (GOOGLE_APPS_SCRIPT_URL) {
                try {
                    await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', data: trx }) });
                } catch (e) { }
            }
        }

        if (typeof google === 'undefined' && !GOOGLE_APPS_SCRIPT_URL) {
            localStorage.setItem('keuangan_data', JSON.stringify(transactions));
        }
        showSyncing(false);
    }

</script>


<script>
    // --- CHARTS LOGIC ---
    let chartIncInstance = null;
    let chartExpInstance = null;
    let chartTrendInstance = null;

    function renderCharts() {
        const monthEl = document.getElementById('report-filter-month-sel');
        const yearEl = document.getElementById('report-filter-year-sel');
        if (!monthEl || !yearEl) return;

        const selMonth = `${yearEl.value}-${monthEl.value}`; // YYYY-MM
        // Exclude Transfers from analytics as they are not real income/expense
        const currentMonthData = transactions.filter(t => t.date.startsWith(selMonth) && t.category !== 'Transfer Keluar' && t.category !== 'Transfer Masuk');

        // 1. KPI Aggregation
        let totalInc = 0, totalExp = 0, totalDisc = 0;
        const expByCat = {};
        const incByCat = {};

        currentMonthData.forEach(t => {
            const amt = Number(t.amount) || 0;
            const disc = Number(t.discount) || 0;
            if (t.type === 'income') {
                totalInc += amt;
                incByCat[t.category] = (incByCat[t.category] || 0) + amt;
            } else if (t.type === 'expense') {
                totalExp += amt;
                totalDisc += disc;
                expByCat[t.category] = (expByCat[t.category] || 0) + amt;
            }
        });

        const netSavings = totalInc - totalExp;
        const savingRate = totalInc > 0 ? Math.round((netSavings / totalInc) * 100) : 0;

        // Update KPIs
        document.getElementById('rpt-total-inc').innerText = formatRp(totalInc);
        document.getElementById('rpt-total-exp').innerText = formatRp(totalExp);
        document.getElementById('rpt-total-net').innerText = (netSavings >= 0 ? '' : '-') + formatRp(Math.abs(netSavings));
        document.getElementById('rpt-saving-rate').innerText = savingRate + '%';

        const rateBar = document.getElementById('rpt-saving-bar');
        if (rateBar) rateBar.style.width = Math.max(0, Math.min(100, savingRate)) + '%';

        const rateStatus = document.getElementById('rpt-saving-status');
        if (rateStatus) {
            if (savingRate >= 30) { rateStatus.innerText = 'Excellent'; rateStatus.className = 'text-[10px] font-bold px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-600 mb-1'; }
            else if (savingRate >= 10) { rateStatus.innerText = 'Good'; rateStatus.className = 'text-[10px] font-bold px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-600 mb-1'; }
            else { rateStatus.innerText = 'Warning'; rateStatus.className = 'text-[10px] font-bold px-1.5 py-0.5 rounded bg-rose-100 text-rose-600 mb-1'; }
        }

        // 2. Trend Data (Last 6 Months)
        const trendLabels = [];
        const trendInc = [];
        const trendExp = [];

        const date = new Date(selMonth + "-01");
        for (let i = 5; i >= 0; i--) {
            const d = new Date(date.getFullYear(), date.getMonth() - i, 1);
            const mKey = d.toISOString().slice(0, 7);
            const mLabel = d.toLocaleString('id-ID', { month: 'short' });

            trendLabels.push(mLabel);
            let mInc = 0, mExp = 0;
            transactions.forEach(t => {
                if (t.date.startsWith(mKey) && t.category !== 'Transfer Keluar' && t.category !== 'Transfer Masuk') {
                    if (t.type === 'income') mInc += Number(t.amount);
                    else if (t.type === 'expense') mExp += Number(t.amount);
                }
            });
            trendInc.push(mInc);
            trendExp.push(mExp);
        }

        // 3. Render Trend Chart
        const ctxTrend = document.getElementById('chartTrend').getContext('2d');
        if (chartTrendInstance) chartTrendInstance.destroy();
        chartTrendInstance = new Chart(ctxTrend, {
            type: 'bar',
            data: {
                labels: trendLabels,
                datasets: [
                    { label: 'Pemasukan', data: trendInc, backgroundColor: '#10b981', borderRadius: 8 },
                    { label: 'Pengeluaran', data: trendExp, backgroundColor: '#f43f5e', borderRadius: 8 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { callback: v => v >= 1000000 ? (v / 1000000) + 'jt' : v } }, x: { grid: { display: false } } }
            }
        });

        // 4. Render Expense Doughnut
        const ctxExp = document.getElementById('chartExpense').getContext('2d');
        if (chartExpInstance) chartExpInstance.destroy();
        const sortedExp = Object.entries(expByCat).sort((a, b) => b[1] - a[1]);

        chartExpInstance = new Chart(ctxExp, {
            type: 'doughnut',
            data: {
                labels: sortedExp.map(x => x[0]),
                datasets: [{
                    data: sortedExp.map(x => x[1]),
                    backgroundColor: ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4', '#94a3b8'],
                    borderWidth: 0,
                    hoverOffset: 15
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: { legend: { display: false } }
            }
        });

        // Top 3 Category List
        const topCatList = document.getElementById('rpt-top-cat-list');
        if (topCatList) {
            topCatList.innerHTML = sortedExp.slice(0, 3).map(([cat, amt]) => `
            <div class="flex items-center justify-between text-xs">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full" style="background-color: #6366f1"></div>
                    <span class="font-medium text-slate-600">${cat}</span>
                </div>
                <span class="font-bold text-slate-800">${Math.round((amt / totalExp) * 100)}%</span>
            </div>
        `).join('');
        }

        // 5. Insights & Efficiency
        const today = new Date();
        const isCurrentMonth = selMonth === today.toISOString().slice(0, 7);
        const days = isCurrentMonth ? today.getDate() : new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        const avgDaily = totalExp / days;

        document.getElementById('rpt-avg-daily').innerText = formatRp(Math.round(avgDaily));

        let totalBudget = 0;
        const monthlyBudgets = budgets.filter(b => b.month === selMonth);
        monthlyBudgets.forEach(b => totalBudget += Number(b.amount));

        const budgetPct = totalBudget > 0 ? Math.round((totalExp / totalBudget) * 100) : 0;
        document.getElementById('rpt-budget-pct').innerText = budgetPct + '%';

        const insightText = document.getElementById('rpt-insight-text');
        if (insightText) {
            if (savingRate >= 30) insightText.innerText = "Luar biasa! Rasio menabung Anda sangat tinggi bulan ini. Pertahankan gaya hidup hemat ini.";
            else if (savingRate > 0) insightText.innerText = "Kondisi stabil. Anda berhasil menyisihkan sebagian pemasukan. Coba fokus kurangi kategori terbesar.";
            else insightText.innerText = "Waspada! Pengeluaran melebihi pemasukan bulan ini. Periksa kembali efisiensi kategori di bawah.";
        }

        // Efficiency List (Budget vs Actual)
        const efficiencyList = document.getElementById('rpt-efficiency-list');
        if (efficiencyList) {
            if (monthlyBudgets.length === 0) {
                efficiencyList.innerHTML = `<p class="text-center py-8 text-slate-400 text-sm italic">Belum ada budget yang diatur untuk bulan ini.</p>`;
            } else {
                efficiencyList.innerHTML = monthlyBudgets.map(b => {
                    const actual = expByCat[b.category] || 0;
                    const pct = Math.round((actual / Number(b.amount)) * 100);
                    const isOver = actual > Number(b.amount);
                    return `
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs font-bold">
                            <span class="text-slate-700">${b.category}</span>
                            <span class="${isOver ? 'text-rose-600' : 'text-emerald-600'}">${pct}%</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full ${isOver ? 'bg-rose-500' : 'bg-emerald-500'}" style="width: ${Math.min(100, pct)}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] text-slate-400 font-medium">
                            <span>Aktual: ${formatRp(actual)}</span>
                            <span>Budget: ${formatRp(b.amount)}</span>
                        </div>
                    </div>
                `;
                }).join('');
            }
        }
    }

</script>


<script>
    // --- AUTH LOGIC ---
    async function handleLogin(e) {
        e.preventDefault();
        const user = document.getElementById('login-user').value;
        const pin = document.getElementById('login-pin').value;
        const btn = document.getElementById('btn-login');
        const err = document.getElementById('login-error');

        btn.innerHTML = `<span class="loader border-t-white w-4 h-4"></span> Memeriksa...`;
        err.classList.add('hidden');

        const onSuccess = (res) => {
            if (res.status === 'success') {
                localStorage.setItem('keuangan_user', res.username);
                const userEl = document.getElementById('current-username');
                if (userEl) userEl.innerText = res.username;
                startApp();
            } else {
                err.innerText = res.message;
                err.classList.remove('hidden');
                btn.innerHTML = `<span>Masuk</span>`;
            }
        };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(onSuccess).withFailureHandler(e => {
                err.innerText = "Koneksi gagal"; err.classList.remove('hidden'); btn.innerHTML = `<span>Masuk</span>`;
            }).verifyLogin(user, pin);
        } else if (GOOGLE_APPS_SCRIPT_URL) {
            try {
                const url = GOOGLE_APPS_SCRIPT_URL;
                const response = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, pin: pin }) });
                const res = await response.json();
                onSuccess(res);
            } catch (e) {
                // Mock Login for local testing
                if (user === 'admin' && pin === '123456') onSuccess({ status: 'success', username: 'admin' });
                else { err.innerText = "Username/PIN salah (Mock)"; err.classList.remove('hidden'); btn.innerHTML = `<span>Masuk</span>`; }
            }
        } else {
            if (user === 'admin' && pin === '123456') onSuccess({ status: 'success', username: 'admin' });
            else { err.innerText = "Username/PIN salah (Mock)"; err.classList.remove('hidden'); btn.innerHTML = `<span>Masuk</span>`; }
        }
    }

    async function fixDatabase() {
        if (!confirm("Apakah Anda yakin ingin menjalankan perbaikan database? Ini akan membuat ulang kolom atau sheet yang mungkin terhapus di Spreadsheet.")) return;
        showSyncing(true);

        const onSuccess = (res) => {
            showSyncing(false);
            alert(res.message || "Database berhasil diperbaiki.");
            window.location.reload();
        };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(onSuccess).withFailureHandler(e => {
                showSyncing(false);
                alert("Gagal memperbaiki database: " + e.message);
            }).setup();
        } else if (GOOGLE_APPS_SCRIPT_URL) {
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'fix_database' })
                });
                const res = await response.json();
                onSuccess(res);
            } catch (e) {
                showSyncing(false);
                alert("Gagal menghubungi server untuk perbaikan.");
            }
        } else {
            showSyncing(false);
            alert("Perbaikan database hanya berfungsi saat terhubung ke Google Apps Script.");
        }
    }

    function handleLogout() {
        localStorage.removeItem('keuangan_user');
        window.location.reload();
    }

    async function startApp() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.querySelector('aside').classList.remove('hidden');
        document.querySelector('aside').classList.add('md:flex');

        renderSidebar();
        showSyncing(true);

        // Try batch loading (single call, much faster)
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            try {
                const batchData = await new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(d => resolve(d))
                        .withFailureHandler(e => reject(e))
                        .batchLoadAllData();
                });

                // Hydrate all global state from batch result
                if (batchData) {
                    transactions = batchData.transactions || [];
                    banks = batchData.banks || [];
                    categoryList = batchData.categories || [];
                    fixedCosts = batchData.fixedCosts || [];
                    if (typeof deposits !== 'undefined') deposits = batchData.deposits || [];
                    if (typeof cryptos !== 'undefined') cryptos = batchData.cryptos || [];
                    ecommerceLogs = batchData.ecommerce || [];
                    ecomPlatforms = batchData.ecomPlatforms || [];
                    if (typeof inventoryItems !== 'undefined') inventoryItems = batchData.inventory || [];

                    // Sync derived state
                    syncCategoryState();
                    renderData();
                    if (typeof renderPortfolio === 'function') renderPortfolio();
                    if (typeof renderEcommerce === 'function') renderEcommerce();
                    if (typeof renderInventory === 'function') renderInventory();
                    if (typeof loadBudget === 'function') await loadBudget();
                    if (typeof renderBudget === 'function') renderBudget();
                    if (typeof renderCategoriesDropdowns === 'function') renderCategoriesDropdowns();
                    if (typeof loadSubscriptions === 'function') await loadSubscriptions();
                    if (typeof renderSubscriptions === 'function') renderSubscriptions();
                    showSyncing(false);
                    console.log('[Batch] All data loaded in single call (' + (Date.now() - (batchData._ts || 0)) + 'ms cache age)');
                    return;
                }
            } catch (e) {
                console.warn('[Batch] Failed, falling back to sequential:', e);
            }
        }

        // Fallback: sequential loading (for fetch mode or if batch fails)
        await loadCategories();
        await loadFixedCosts();
        await loadBanks();
        await loadData();
        if (typeof loadPortfolio === 'function') await loadPortfolio();
        if (typeof loadEcommerce === 'function') await loadEcommerce();
        if (typeof loadInventory === 'function') await loadInventory();
        if (typeof loadBudget === 'function') await loadBudget();
        if (typeof renderBudget === 'function') renderBudget();
        if (typeof renderCategoriesDropdowns === 'function') renderCategoriesDropdowns();
        if (typeof loadSubscriptions === 'function') await loadSubscriptions();
        if (typeof renderSubscriptions === 'function') renderSubscriptions();
    }

    function _getBankBalance(id) {
        let bal = 0;
        const b = banks.find(x => x.id === id);
        if (b) bal = Number(b.initial_balance) || 0;
        transactions.forEach(t => {
            if (t.bank === id) {
                if (t.type === 'income') bal += Number(t.amount);
                else if (t.type === 'expense') bal -= Number(t.amount);
            }
        });
        return bal;
    }

    function init() {
        const incDateEl = document.getElementById('inc-date');
        const expDateEl = document.getElementById('exp-date');
        const tfDateEl = document.getElementById('tf-date');
        const quickExpDateEl = document.getElementById('quick-exp-date');

        if (incDateEl) incDateEl.value = new Date().toISOString().split('T')[0];
        if (expDateEl) expDateEl.value = new Date().toISOString().split('T')[0];
        if (tfDateEl) tfDateEl.value = new Date().toISOString().split('T')[0];
        if (quickExpDateEl) quickExpDateEl.value = new Date().toISOString().split('T')[0];
        updateVisibilityUI();
        const invDateEl = document.getElementById('inv-date');
        if (invDateEl) invDateEl.value = new Date().toISOString().split('T')[0];

        // Populate Report Year Select & Defaults
        const rptMonthSel = document.getElementById('report-filter-month-sel');
        const rptYearSel = document.getElementById('report-filter-year-sel');
        if (rptMonthSel && rptYearSel) {
            const now = new Date();
            const curYear = now.getFullYear();
            const curMonth = (now.getMonth() + 1).toString().padStart(2, '0');

            let yearHtml = '';
            for (let y = curYear - 5; y <= curYear + 1; y++) {
                yearHtml += `<option value="${y}">${y}</option>`;
            }
            rptYearSel.innerHTML = yearHtml;
            rptYearSel.value = curYear;
            rptMonthSel.value = curMonth;
        }

        const user = localStorage.getItem('keuangan_user');
        if (user) {
            const userEl = document.getElementById('current-username');
            if (userEl) userEl.innerText = user;
            startApp();
        } else {
            document.getElementById('view-login').classList.remove('hidden');
        }
    }

    document.addEventListener('DOMContentLoaded', init);

</script>
