<script>
    // --- CORE UI LOGIC ---
    function renderSidebar() {
        const nav = document.getElementById('sidebar-nav');
        nav.innerHTML = `<div class="text-[11px] font-bold text-slate-400 uppercase tracking-wider px-2 mb-2">Menu Utama</div>`;
        MENU_CONFIG.forEach(menu => {
            nav.innerHTML += `<button id="nav-${menu.id}" onclick="switchView('${menu.id}')" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-semibold transition-all group">${menu.icon} <span>${menu.label}</span></button>`;
        });
        switchView('dashboard'); // Default
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('main-sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (!sidebar) return;

        const isOpen = sidebar.classList.contains('translate-x-0');

        if (isOpen) {
            sidebar.classList.remove('translate-x-0');
            sidebar.classList.add('-translate-x-full');
            if (backdrop) backdrop.classList.add('hidden');
        } else {
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0');
            if (backdrop) backdrop.classList.remove('hidden');
        }
    }

    function switchView(viewId) {
        document.querySelectorAll('.view-module').forEach(v => {
            v.classList.add('hidden'); v.classList.remove('block');
        });
        const target = document.getElementById(`view-${viewId}`);
        if (target) {
            target.classList.remove('hidden'); target.classList.add('block');
        }

        MENU_CONFIG.forEach(m => {
            const btn = document.getElementById(`nav-${m.id}`);
            if (btn) btn.className = m.id === viewId
                ? "w-full flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-semibold transition-all"
                : "w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-indigo-600 rounded-xl font-semibold transition-all group";
        });

        if (viewId === 'report' && typeof renderCharts === 'function') renderCharts();
        if (viewId === 'configuration') {
            if (typeof renderCategoryList === 'function') renderCategoryList();
            if (typeof renderFixedCosts === 'function') renderFixedCosts();
            if (typeof renderCategoriesDropdowns === 'function') renderCategoriesDropdowns();
            if (typeof renderEcomPlatformList === 'function') renderEcomPlatformList();
        }
        if (viewId === 'expense' && typeof renderFixedCosts === 'function') renderFixedCosts();
        if (viewId === 'portfolio' && typeof renderPortfolio === 'function') renderPortfolio();
        if (viewId === 'ecommerce' && typeof renderEcommerce === 'function') renderEcommerce();
        if (viewId === 'inventory' && typeof renderInventory === 'function') renderInventory();
        if (viewId === 'subscription' && typeof renderSubscriptions === 'function') renderSubscriptions();
        if (viewId === 'budget' && typeof renderBudget === 'function') renderBudget();
        if (viewId === 'profile' && typeof renderProfile === 'function') renderProfile();
        if (viewId === 'dashboard') {
            if (typeof renderPortfolio === 'function') renderPortfolio();
            if (typeof renderBudgetDashboard === 'function') renderBudgetDashboard();
            if (typeof renderSubscriptionDashboard === 'function') renderSubscriptionDashboard();
        }

        if (window.innerWidth < 768) {
            const sidebar = document.getElementById('main-sidebar');
            if (sidebar && sidebar.classList.contains('translate-x-0')) {
                toggleSidebar();
            }
        }
    }

    let isBalanceHidden = localStorage.getItem('keuangan_hide_balance') === 'true';

    function formatRp(angka) {
        if (isBalanceHidden) return "Rp ●●●●●●";
        return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(angka);
    }
    const formatCurrency = formatRp;

    function toggleBalanceVisibility() {
        isBalanceHidden = !isBalanceHidden;
        localStorage.setItem('keuangan_hide_balance', isBalanceHidden);
        updateVisibilityUI();
        renderData();
        if (typeof renderBudget === 'function') renderBudget();
        if (typeof renderBudgetDashboard === 'function') renderBudgetDashboard();
        if (typeof renderPortfolio === 'function') renderPortfolio();
        if (typeof renderEcommerce === 'function') renderEcommerce();
        if (typeof renderInventory === 'function') renderInventory();
    }

    function updateVisibilityUI() {
        const btn = document.getElementById('btn-toggle-visibility');
        if (!btn) return;

        const eyeIcon = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
    `;
        const eyeOffIcon = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
    `;

        btn.innerHTML = isBalanceHidden ? eyeOffIcon : eyeIcon;
        btn.title = isBalanceHidden ? "Tampilkan Saldo" : "Sembunyikan Saldo";
    }

    function cleanNumber(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        // Hapus titik pemisah ribuan dan ganti koma desimal jadi titik jika ada
        let clean = val.toString().replace(/\./g, "").replace(/,/g, ".");
        return parseFloat(clean) || 0;
    }

    function formatCurrencyInput(input) {
        // Hilangkan semua karakter kecuali angka
        let value = input.value.replace(/\D/g, "");
        // Format dengan titik sebagai pemisah ribuan
        if (value) {
            input.value = new Intl.NumberFormat('id-ID').format(value);
        } else {
            input.value = "";
        }
    }

    // --- PREMIUM DROPDOWN ENGINE ---
    function initPremiumDropdown(selectId, options, placeholder = 'Pilih...') {
        const selectEl = document.getElementById(selectId);
        if (!selectEl) return;

        // Sembunyikan select asli tapi tetap gunakan untuk menyimpan nilai (agar form tidak rusak)
        selectEl.classList.add('hidden');
        
        // Cek apakah container sudah ada, jika belum buat
        let container = selectEl.parentElement.querySelector('.custom-select-container');
        if (!container) {
            container = document.createElement('div');
            container.className = 'custom-select-container';
            selectEl.parentElement.appendChild(container);
        }

        // Mapping Emojis (Optional but makes it premium)
        const emojiMap = {
            'Gaji': '💰', 'Bonus': '✨', 'Investasi': '📈', 'Makan': '🍔', 'Transport': '🚗', 
            'Belanja': '🛍️', 'Kesehatan': '💊', 'Hiburan': '🎮', 'Listrik': '⚡', 'Pendidikan': '📚',
            'MRT': '🚇', 'Transportation': '🚌', 'Parkir': '🅿️', 'Air': '🚰', 'Internet': '🌐',
            'Pulsa': '📱', 'Streaming': '📺', 'Makan & Minum': '🍜', 'Jajan': '☕'
        };

        const getEmoji = (name) => {
            for (let key in emojiMap) { if (name.includes(key)) return emojiMap[key]; }
            return '📁';
        };

        const triggerHtml = `
            <div class="custom-select-trigger w-full flex justify-between items-center rounded-xl bg-slate-50 border border-slate-200 p-3 text-sm text-slate-900 font-medium hover:bg-white hover:border-slate-300 transition-all cursor-pointer">
                <span class="selected-text truncate">${placeholder}</span>
                <svg class="w-4 h-4 text-slate-400 shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        `;

        const optionsHtml = `
            <div class="custom-select-options custom-scrollbar">
                ${options.map((opt, index) => {
                    if (opt.isDivider) {
                        return `<div class="h-px bg-slate-100 my-2 mx-2"></div>`;
                    }
                    
                    const label = typeof opt === 'object' ? opt.name : opt;
                    const val = typeof opt === 'object' ? opt.id : opt;
                    const isMain = typeof opt === 'object' && opt.isMain;
                    const isSub = typeof opt === 'object' && opt.isSub;
                    
                    if (isMain) {
                        return `<div class="custom-select-option main-category px-4 py-2.5 hover:bg-slate-50 transition-colors" data-value="${val}">
                            <div class="flex items-center gap-3">
                                <span class="w-2.5 h-2.5 rounded-full bg-indigo-600 shadow-sm shadow-indigo-200"></span>
                                <span class="text-slate-900 font-bold text-[11px] tracking-tight uppercase">${label}</span>
                            </div>
                        </div>`;
                    } else if (isSub) {
                        return `<div class="custom-select-option sub-category px-4 py-2 hover:bg-indigo-50/30 group transition-colors" data-value="${val}">
                            <div class="flex items-center gap-3 ml-6">
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-300 group-hover:bg-indigo-400 transition-colors"></span>
                                <span class="text-slate-600 font-medium text-[13px] group-hover:text-indigo-600 transition-colors">${label}</span>
                            </div>
                        </div>`;
                    } else {
                        return `<div class="custom-select-option px-4 py-2.5 hover:bg-slate-50 transition-colors" data-value="${val}">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                                <span class="text-slate-700 font-medium text-sm">${label}</span>
                            </div>
                        </div>`;
                    }
                }).join('')}
            </div>
        `;

        container.innerHTML = triggerHtml + optionsHtml;

        const trigger = container.querySelector('.custom-select-trigger');
        const optionsList = container.querySelector('.custom-select-options');
        const selectedText = container.querySelector('.selected-text');

        // Toggle Open
        trigger.onclick = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.custom-select-options').forEach(el => {
                if (el !== optionsList) el.classList.remove('active');
            });
            optionsList.classList.toggle('active');
        };

        // Select Option
        container.querySelectorAll('.custom-select-option').forEach(opt => {
            opt.onclick = () => {
                const val = opt.getAttribute('data-value');
                let displayHtml = '';
                
                if (opt.classList.contains('sub-category')) {
                    const label = opt.querySelector('span:last-child').innerText;
                    displayHtml = `<div class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> ${label}</div>`;
                } else if (opt.classList.contains('main-category')) {
                    const label = opt.querySelector('span:last-child').innerText;
                    displayHtml = `<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-indigo-500"></span> <strong>${label}</strong></div>`;
                } else {
                    displayHtml = opt.innerText;
                }
                
                selectEl.value = val;
                selectedText.innerHTML = displayHtml;
                optionsList.classList.remove('active');
                
                // Trigger change event for filtering
                selectEl.dispatchEvent(new Event('change'));
            };
        });

        // Close on click outside
        document.addEventListener('click', () => optionsList.classList.remove('active'));
    }

    // Fungsi untuk memperbarui semua dropdown kategori
    function renderCategoriesDropdowns() {
        // Populasikan select native asli terlebih dahulu agar form backend tidak error
        if (typeof renderNativeCategoriesDropdowns === 'function') {
            renderNativeCategoriesDropdowns();
        }

        // Build Hierarchical Arrays
        const buildHierarchy = (type) => {
            const parents = categoryList.filter(c => c.type === type && (!c.parent_id || c.parent_id === ''));
            let options = [];
            parents.forEach(p => {
                const children = categoryList.filter(c => c.parent_id === p.id);
                if (children.length > 0) {
                    // Parent Item (Bisa dipilih juga)
                    options.push({ id: p.name, name: p.name, isMain: true });
                    // Children Items
                    children.forEach(ch => {
                        options.push({ id: p.name + ' - ' + ch.name, name: ch.name, isSub: true });
                    });
                    // Garis pemisah antar grup
                    options.push({ isDivider: true });
                } else {
                    // Item tunggal
                    options.push({ id: p.name, name: p.name });
                }
            });
            if (options.length === 0) options.push({ id: 'Lainnya', name: 'Lainnya' });
            return options;
        };

        initPremiumDropdown('inc-category', buildHierarchy('income'), 'Pilih Kategori Pemasukan');
        initPremiumDropdown('exp-category', buildHierarchy('expense'), 'Pilih Kategori Pengeluaran');
        
        // Akun Bank juga bisa dibuat premium
        if (banks && banks.length > 0) {
            const bankOpts = banks.map(b => ({ id: b.id, name: b.name }));
            initPremiumDropdown('inc-bank', bankOpts, 'Pilih Akun Tujuan');
            initPremiumDropdown('exp-bank', bankOpts, 'Pilih Akun Pembayar');
            initPremiumDropdown('quick-exp-bank', bankOpts, 'Pilih Akun Pembayar');
        }
    }

    let _selectedEwallet = '';
    let _selectedEmoney = '';
    let _bankCardFilter = 'all';

        _selectedEwallet = '';

        const acType = b.account_type || 'bank';
        if (acType === 'ewallet') return b.account_number && b.account_number !== '-' ? `📱 ${b.account_number}` : '';
        if (acType === 'emoney') return b.account_number && b.account_number !== '-' ? `💳 ${b.account_number}` : '';
        if (acType === 'paylater' || acType === 'credit_card') return b.account_number && b.account_number !== '-' ? `💳 ${b.account_number}` : '';
        if (acType === 'cash') return '';
        return b.account_number && b.account_number !== '-' ? b.account_number : '';
    }

    function _getCardAccent(b) {
        const acType = b.account_type || 'bank';
        if (acType === 'ewallet') {
            const info = EWALLET_BRANDS[b.name];
            const c = info ? info.color : 'emerald';
            return `from-${c}-50 to-${c}-100`;
        }
        if (acType === 'emoney') {
            const info = EMONEY_BRANDS[b.name];
            const c = info ? info.color : 'purple';
            return `from-${c}-50 to-${c}-100`;
        }
        if (acType === 'credit_card') return 'from-slate-50 to-slate-100';
        if (acType === 'paylater') return 'from-rose-50 to-rose-100';
        if (acType === 'cash') return 'from-amber-50 to-amber-100';
        return 'from-indigo-50 to-blue-50';
    }

        if (tfToEl) tfToEl.innerHTML = incSelects;
        if (tfTo2El) tfTo2El.innerHTML = incSelects;
        if (quickExpBankEl) quickExpBankEl.innerHTML = incSelects;

        // Hitung saldo riil per bank
        const bankBalances = {};
        if (banks) {
            banks.forEach(b => {
                bankBalances[b.id] = Number(b.initial_balance) || 0;
            });
        }

        if (transactions && banks) {
            transactions.forEach(t => {
                if (t.bank && bankBalances[t.bank] !== undefined) {
                    if (t.type === 'income') bankBalances[t.bank] += Number(t.amount);
                    else if (t.type === 'expense') bankBalances[t.bank] -= Number(t.amount);
                }
            });
        }

        // Kalkulasi Total Saldo (Net Worth), Total Assets, dan Total Debt
        let totalAssets = 0;
        let totalDebt = 0;

        for (const key in bankBalances) {
            const bank = banks.find(b => b.id === key);
            const bal = bankBalances[key];
            const type = bank ? (bank.account_type || 'bank') : 'bank';

            if (type === 'paylater' || type === 'credit_card') {
                if (bal < 0) totalDebt += Math.abs(bal);
            } else {
                totalAssets += bal;

    function renderData() {
        // Pengaman Global
        if (!Array.isArray(transactions)) transactions = [];
        if (!Array.isArray(banks)) banks = [];
        if (!Array.isArray(categoryList)) categoryList = [];

        let dashInc = 0, dashExp = 0, totalDiscount = 0;
        const listInc = [], listExp = [], listRecent = [];

        const filterIncEl = document.getElementById('filter-inc-month');
        const filterExpEl = document.getElementById('filter-exp-month');

        // Set default value to current month if empty
        const currentMonth = new Date().toISOString().slice(0, 7); // YYYY-MM
        if (filterIncEl && !filterIncEl.value) filterIncEl.value = currentMonth;
        if (filterExpEl && !filterExpEl.value) filterExpEl.value = currentMonth;

        const filterInc = filterIncEl ? filterIncEl.value : currentMonth;
        const filterExp = filterExpEl ? filterExpEl.value : currentMonth;

        // Build 6-month history
        const monthlyData = {};
        for (let m = 5; m >= 0; m--) {
            const d = new Date();
            d.setMonth(d.getMonth() - m);
            const key = d.toISOString().slice(0, 7);
            monthlyData[key] = { income: 0, expense: 0, label: d.toLocaleDateString('id-ID', { month: 'short' }) };
        }

        // Category breakdown for current month
        const catSpend = {};

        if (!transactions) transactions = [];
        transactions.forEach((t, index) => {
            const tMonth = t.date ? t.date.slice(0, 7) : '';
            const amt = Number(t.amount);
            const isTransfer = (t.category === 'Transfer Masuk' || t.category === 'Transfer Keluar');

            if (t.type === 'income') {
                if (!isTransfer) {
                    if (tMonth === currentMonth) dashInc += amt;
                    if (monthlyData[tMonth]) monthlyData[tMonth].income += amt;
                }
                if (tMonth === filterInc) listInc.push(t);
            }
            else if (t.type === 'expense') {
                if (!isTransfer) {
                    if (tMonth === currentMonth) {
                        dashExp += amt;
                        totalDiscount += (Number(t.discount) || 0);
                        const cat = t.category || 'Lainnya';
                        catSpend[cat] = (catSpend[cat] || 0) + amt;
                    }
                    if (monthlyData[tMonth]) monthlyData[tMonth].expense += amt;
                }
                if (tMonth === filterExp) listExp.push(t);
            }
            if (index < 7) listRecent.push(t); // Top 7 recent for dashboard
        });

        // Update Dashboard Summary
        const dashIncEl = document.getElementById('dash-income');
        const dashExpEl = document.getElementById('dash-expense');

        if (dashIncEl) dashIncEl.innerText = formatRp(dashInc);
        if (dashExpEl) dashExpEl.innerText = formatRp(dashExp);

        const dashDiscEl = document.getElementById('dash-savings-discount');
        if (dashDiscEl) dashDiscEl.innerText = formatRp(totalDiscount);

        // Net Cash Flow
        const cashflowEl = document.getElementById('dash-cashflow');
        if (cashflowEl) {
            const net = dashInc - dashExp;
            cashflowEl.innerText = (net >= 0 ? '+' : '') + formatRp(net);
            cashflowEl.className = 'text-xl font-extrabold tracking-tight ' + (net >= 0 ? 'text-emerald-600' : 'text-rose-600');
        }

        // Month label
        const monthLabel = document.getElementById('dash-month-label');
        if (monthLabel) {
            monthLabel.innerText = new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        }

        // Bank count label
        const bankCountLabel = document.getElementById('dash-bank-count-label');
        if (bankCountLabel) bankCountLabel.innerText = (banks ? banks.length : 0) + ' Akun';

        // E-Commerce total
        const ecomTotalEl = document.getElementById('dash-ecom-total');
        if (ecomTotalEl && typeof ecommerceLogs !== 'undefined') {
            const ecomMonth = ecommerceLogs.filter(e => {
                const eMonth = e.date ? e.date.slice(0, 7) : '';
                return eMonth === currentMonth;
            }).reduce((sum, e) => sum + Number(e.amount), 0);
            ecomTotalEl.innerText = formatRp(ecomMonth);
        }

        // ===== SISA BUDGET & SAVING RATE =====
        const remaining = dashInc - dashExp;
        const savingRate = dashInc > 0 ? Math.round((remaining / dashInc) * 100) : 0;
        const usagePct = dashInc > 0 ? Math.min(100, Math.round((dashExp / dashInc) * 100)) : 0;

        // Sisa Budget card
        const remainingEl = document.getElementById('dash-remaining');
        const remainingPctEl = document.getElementById('dash-remaining-pct-text');
        if (remainingEl) {
            remainingEl.innerText = (remaining >= 0 ? '' : '-') + formatRp(Math.abs(remaining));
            remainingEl.className = 'text-xl font-extrabold tracking-tight ' + (remaining >= 0 ? 'text-indigo-600' : 'text-rose-600');
        }
        if (remainingPctEl) {
            if (dashInc > 0) {
                remainingPctEl.innerText = remaining >= 0 ? savingRate + '% tersisa' : 'Over budget!';
                remainingPctEl.className = 'text-[9px] mt-1 font-medium ' + (remaining >= 0 ? 'text-indigo-400' : 'text-rose-500');
            } else {
                remainingPctEl.innerText = 'Belum ada pemasukan';
                remainingPctEl.className = 'text-[9px] mt-1 text-slate-400';
            }
        }

        // Saving Rate ring (SVG circle)
        const ringEl = document.getElementById('dash-saving-ring');
        const rateEl = document.getElementById('dash-saving-rate');
        if (ringEl && rateEl) {
            const clampedRate = Math.max(0, Math.min(100, savingRate));
            const offset = 283 - (283 * clampedRate / 100);
            ringEl.style.strokeDashoffset = offset;
            // Color based on rate
            if (clampedRate >= 30) ringEl.style.stroke = '#34d399'; // emerald
            else if (clampedRate >= 10) ringEl.style.stroke = '#fbbf24'; // amber
            else ringEl.style.stroke = '#f87171'; // rose
            rateEl.innerText = clampedRate + '%';
        }

        // Budget Usage bar
        const budgetBar = document.getElementById('dash-budget-bar');
        const budgetLabel = document.getElementById('dash-budget-usage-label');
        const budgetMax = document.getElementById('dash-budget-bar-max');
        if (budgetBar) {
            budgetBar.style.width = usagePct + '%';
            // Color gradient based on usage
            if (usagePct <= 60) budgetBar.className = 'dash-bar h-full rounded-full bg-gradient-to-r from-emerald-400 to-emerald-500 transition-all';
            else if (usagePct <= 80) budgetBar.className = 'dash-bar h-full rounded-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all';
            else budgetBar.className = 'dash-bar h-full rounded-full bg-gradient-to-r from-rose-400 to-red-500 transition-all';
        }
        if (budgetLabel) budgetLabel.innerText = usagePct + '% terpakai';
        if (budgetMax) budgetMax.innerText = dashInc > 0 ? 'Target: ' + formatRp(dashInc) : 'Catat pemasukan untuk melihat budget';

        // ===== FINANCIAL HEALTH & INSIGHTS =====
        const healthScoreVal = document.getElementById('health-score-val');
        const healthScoreCircle = document.getElementById('health-score-circle');
        const healthBadge = document.getElementById('health-score-badge');
        const healthTip = document.getElementById('health-tip');

        if (healthScoreVal && healthScoreCircle) {
            let score = 50;
            score += Math.min(30, savingRate);

            let totalAssets = 0, totalDebt = 0;
            banks.forEach(b => {
                const bal = _getBankBalance(b.id);
                if (b.account_type === 'paylater' || b.account_type === 'credit_card') {
                    if (bal < 0) totalDebt += Math.abs(bal);
                } else totalAssets += bal;
            });
            const dti = dashInc > 0 ? (totalDebt / dashInc) : (totalDebt > 0 ? 1 : 0);
            score -= Math.min(25, Math.round(dti * 50));

            score = Math.max(10, Math.min(100, score));
            healthScoreVal.innerText = score;
            healthScoreCircle.style.strokeDasharray = `${score}, 100`;

            if (score >= 80) {
                healthBadge.innerText = 'Excellent';
                healthBadge.className = 'px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider bg-emerald-100 text-emerald-600';
                healthTip.innerText = "Kondisi keuangan sangat sehat! Pertahankan rasio menabung Anda.";
            } else if (score >= 60) {
                healthBadge.innerText = 'Good';
                healthBadge.className = 'px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider bg-indigo-100 text-indigo-600';
                healthTip.innerText = "Keuangan stabil. Coba kurangi cicilan/paylater untuk skor lebih tinggi.";
            } else {
                healthBadge.innerText = 'Warning';
                healthBadge.className = 'px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider bg-rose-100 text-rose-600';
                healthTip.innerText = "Waspada! Pengeluaran atau hutang Anda cukup tinggi dibanding pemasukan.";
            }

            const debtRatioEl = document.getElementById('health-debt-ratio');
            if (debtRatioEl) debtRatioEl.innerText = Math.round(dti * 100) + '%';
            const savingStatusEl = document.getElementById('health-saving-status');
            if (savingStatusEl) savingStatusEl.innerText = savingRate >= 20 ? 'Solid' : (savingRate > 0 ? 'Fair' : 'Low');
        }

        const forecastValEl = document.getElementById('dash-forecast-val');
        const forecastDescEl = document.getElementById('dash-forecast-desc');
        const forecastBarEl = document.getElementById('dash-forecast-bar');
        if (forecastValEl) {
            const today = new Date().getDate();
            const lastDay = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            const dailyAvg = dashExp / today;
            const projectedExp = dailyAvg * lastDay;

            let totalLiquid = 0;
            banks.forEach(b => {
                if (b.account_type !== 'paylater' && b.account_type !== 'credit_card') {
                    totalLiquid += _getBankBalance(b.id);
                }
            });

            const forecastEnd = dashInc - projectedExp;
            forecastValEl.innerText = (forecastEnd >= 0 ? '' : '-') + formatRp(Math.abs(Math.round(forecastEnd)));

            const forecastStatusEl = document.getElementById('dash-forecast-status');
            if (forecastStatusEl) {
                const isPositive = forecastEnd >= 0;
                forecastStatusEl.innerText = isPositive ? 'Surplus' : 'Defisit';
                forecastStatusEl.className = `text-[10px] font-bold ${isPositive ? 'bg-emerald-400/20 text-emerald-100' : 'bg-rose-400/20 text-rose-100'} px-2 py-0.5 rounded-full`;
            }

            if (forecastDescEl) {
                forecastDescEl.innerText = forecastEnd >= 0
                    ? "Berdasarkan tren belanja, Anda diprediksi memiliki sisa saldo dari pemasukan bulan ini."
                    : "Waspada! Jika tren belanja berlanjut, pengeluaran Anda akan melebihi pemasukan bulan ini.";
            }

            if (forecastBarEl) {
                const progress = dashInc > 0 ? Math.min(100, Math.max(0, (forecastEnd / dashInc) * 100)) : 0;
                forecastBarEl.style.width = progress + '%';
            }
        }

        const topSpendingEl = document.getElementById('dash-top-spending');
        if (topSpendingEl) {
            const catMap = {};
            transactions.filter(t => t.type === 'expense' && t.date.slice(0, 7) === currentMonth).forEach(t => {
                const c = t.category ? t.category.split(' - ')[0] : 'Lainnya';
                catMap[c] = (catMap[c] || 0) + Number(t.amount);
            });
            const sortedCats = Object.entries(catMap).sort((a, b) => b[1] - a[1]).slice(0, 3);

            if (sortedCats.length === 0) {
                topSpendingEl.innerHTML = `<p class="text-xs text-slate-400 italic py-4">Belum ada pengeluaran bulan ini.</p>`;
            } else {
                let topHtml = '';
                sortedCats.forEach(([name, val]) => {
                    const pct = dashExp > 0 ? Math.round((val / dashExp) * 100) : 0;
                    topHtml += `
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[11px] font-bold text-slate-700">${name}</span>
                            <span class="text-[10px] font-bold text-slate-400">${formatRp(val)} (${pct}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                            <div class="bg-indigo-500 h-full rounded-full transition-all duration-1000" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
                });
                topSpendingEl.innerHTML = topHtml;
            }
        }

        // ===== SMART SUGGESTION LOGIC =====
        const suggestTextEl = document.getElementById('smart-suggestion-text');
        if (suggestTextEl) {
            if (dashInc === 0) {
                suggestTextEl.innerText = "Belum ada pemasukan yang dicatat. Catat gaji atau pendapatan Anda untuk mendapatkan analisa cerdas.";
            } else {
                const idealSaving = Math.round(dashInc * 0.2); // 20% rule
                const actualSaving = dashInc - dashExp;

                if (actualSaving < 0) {
                    suggestTextEl.innerHTML = `Waspada! Pengeluaran Anda <strong>melebihi</strong> pemasukan sebesar <span class="text-rose-600 font-bold">${formatRp(Math.abs(actualSaving))}</span>. Segera tinjau pengeluaran terbesar Anda!`;
                } else if (actualSaving >= idealSaving) {
                    suggestTextEl.innerHTML = `Luar biasa! Anda telah menabung <span class="text-emerald-600 font-bold">${formatRp(actualSaving)}</span> (${savingRate}%). Ini sudah di atas target ideal 20%. Pertahankan!`;
                } else {
                    const diff = idealSaving - actualSaving;
                    suggestTextEl.innerHTML = `Anda baru menabung <span class="text-indigo-600 font-bold">${formatRp(actualSaving)}</span> (${savingRate}%). Coba hemat <span class="text-amber-600 font-bold">${formatRp(diff)}</span> lagi bulan ini untuk mencapai target ideal menabung 20% dari gaji.`;
                }
            }
        }

        // ===== CASH FLOW CHART (6 months) =====
        const chartEl = document.getElementById('dash-cashflow-chart');
        if (chartEl) {
            const months = Object.keys(monthlyData);
            const maxVal = Math.max(1, ...months.map(k => Math.max(monthlyData[k].income, monthlyData[k].expense)));

            chartEl.innerHTML = months.map((key, idx) => {
                const m = monthlyData[key];
                const incH = Math.max(4, Math.round((m.income / maxVal) * 140));
                const expH = Math.max(4, Math.round((m.expense / maxVal) * 140));
                const isCurrent = key === currentMonth;
                return `<div class="flex-1 flex flex-col items-center gap-1">
                <div class="flex items-end gap-0.5 h-[140px]">
                    <div class="dash-cashflow-bar w-3 rounded-t-md bg-emerald-400 ${isCurrent ? 'bg-emerald-500' : 'bg-emerald-300'}" style="height:${incH}px;animation-delay:${idx * 80}ms" title="Masuk: ${formatRp(m.income)}"></div>
                    <div class="dash-cashflow-bar w-3 rounded-t-md ${isCurrent ? 'bg-rose-500' : 'bg-rose-300'}" style="height:${expH}px;animation-delay:${idx * 80 + 40}ms" title="Keluar: ${formatRp(m.expense)}"></div>
                </div>
                <span class="text-[9px] font-semibold ${isCurrent ? 'text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded-full' : 'text-slate-400'}">${m.label}</span>
            </div>`;
            }).join('');
        }

        // ===== CATEGORY BREAKDOWN =====
        const catEl = document.getElementById('dash-category-breakdown');
        if (catEl) {
            const catKeys = Object.keys(catSpend).sort((a, b) => catSpend[b] - catSpend[a]).slice(0, 6);
            if (catKeys.length === 0) {
                catEl.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">Belum ada pengeluaran bulan ini.</p>';
            } else {
                const maxCat = catSpend[catKeys[0]];
                const catColors = ['bg-rose-500', 'bg-orange-500', 'bg-amber-500', 'bg-indigo-500', 'bg-violet-500', 'bg-slate-400'];
                catEl.innerHTML = catKeys.map((cat, i) => {
                    const pct = Math.round((catSpend[cat] / dashExp) * 100);
                    const barW = Math.max(10, Math.round((catSpend[cat] / maxCat) * 100));
                    return `<div>
                    <div class="flex items-center justify-between mb-0.5">
                        <span class="text-[11px] font-semibold text-slate-700 truncate max-w-[120px]">${cat}</span>
                        <span class="text-[10px] font-bold text-slate-500">${formatRp(catSpend[cat])}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="dash-bar h-full ${catColors[i] || 'bg-slate-400'} rounded-full" style="width:${barW}%;animation-delay:${i * 100}ms"></div>
                        </div>
                        <span class="text-[9px] text-slate-400 font-bold w-7 text-right">${pct}%</span>
                    </div>
                </div>`;
                }).join('');
            }
        }

        // Render Lists
        const listIncEl = document.getElementById('list-income');
        const listExpEl = document.getElementById('list-expense');
        const recentEl = document.getElementById('recent-transactions');

        if (listIncEl) listIncEl.innerHTML = listInc.length ? listInc.map(t => generateRowHTML(t)).join('') : '<p class="text-slate-400 text-center py-4">Belum ada data bulan ini.</p>';
        if (listExpEl) listExpEl.innerHTML = listExp.length ? renderGroupedExpenses(listExp) : '<p class="text-slate-400 text-center py-4">Belum ada data bulan ini.</p>';
        if (recentEl) recentEl.innerHTML = listRecent.length ? listRecent.map(t => generateRowHTML(t)).join('') : '<p class="text-slate-400 text-sm">Belum ada data.</p>';

        renderBanks();
    }

    function renderGroupedExpenses(list) {
        // Group by date
        const grouped = {};
        list.sort((a,b) => new Date(b.date) - new Date(a.date)); // Sort newest first
        list.forEach(t => {
            if(!grouped[t.date]) grouped[t.date] = { items: [], total: 0 };
            grouped[t.date].items.push(t);
            grouped[t.date].total += Number(t.amount);
        });

        let html = '';
        for (const date in grouped) {
            const dateObj = new Date(date);
            const dateStr = dateObj.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            html += `
            <div class="mb-4">
                <div class="flex items-center justify-between bg-slate-50 border border-slate-200 px-3 py-2 rounded-t-xl">
                    <span class="text-xs font-bold text-slate-600 uppercase tracking-wider">${dateStr}</span>
                    <span class="text-sm font-extrabold text-rose-600">${formatRp(grouped[date].total)}</span>
                </div>
                <div class="border border-t-0 border-slate-100 rounded-b-xl space-y-0 overflow-hidden divide-y divide-slate-100">
                    ${grouped[date].items.map(t => generateRowHTML(t, true)).join('')}
                </div>
            </div>
            `;
        }
        return html;
    }

    function generateRowHTML(trx, isGrouped = false) {
        const isInc = trx.type === 'income';
        const iconColor = isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600';
        const amtColor = isInc ? 'text-emerald-600' : 'text-rose-600';
        const sign = isInc ? '+' : '-';
        const iconSvg = isInc
            ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>`
            : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"></path></svg>`;

        const bankName = trx.bank ? (banks.find(b => b.id === trx.bank)?.name || 'N/A') : 'N/A';
        const wrapperClass = isGrouped 
            ? "flex items-center justify-between p-3 bg-white hover:bg-slate-50 transition-colors group"
            : "flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-slate-50 transition-colors group";

        return `
        <div class="${wrapperClass}">
            <div class="flex items-center gap-3">
                <div class="p-2 rounded-lg ${iconColor}">${iconSvg}</div>
                <div>
                    <p class="font-semibold text-sm text-slate-800">
                        ${trx.category} 
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded ml-1 border border-slate-200">${bankName}</span>
                        ${trx.discount > 0 ? `<span class="text-[10px] bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded ml-1 border border-emerald-100 font-bold">Hemat ${formatRp(trx.discount)}</span>` : ''}
                    </p>
                    <p class="text-xs text-slate-500">${trx.date} ${trx.description ? '• ' + trx.description : ''}</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <p class="font-bold text-sm ${amtColor}">${sign}${formatRp(trx.amount)}</p>
                <button onclick="editTransaction('${trx.id}')" title="Edit" class="text-slate-300 hover:text-indigo-500 p-1 opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                <button onclick="deleteTrx('${trx.id}')" title="Hapus" class="text-slate-300 hover:text-rose-500 p-1 opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
            </div>
        </div>
    `;
    }

</script>


<script>
    // --- DATA LOGIC ---
    // ==========================================
    // UNIVERSAL EDIT MODAL LOGIC
    // ==========================================
    let _editCallback = null;

    function openEditModal(title, fieldsHtml, callback) {
        _editCallback = callback;
        document.getElementById('edit-modal-title').textContent = title;
        document.getElementById('edit-modal-body').innerHTML = fieldsHtml;
        const modal = document.getElementById('edit-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeEditModal() {
        const modal = document.getElementById('edit-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        _editCallback = null;
    }

    function submitEditModal(e) {
        e.preventDefault();
        if (_editCallback) _editCallback();
        closeEditModal();
    }

    function _editField(label, id, value, type, extra) {
        type = type || 'text';
        extra = extra || '';
        const escaped = String(value).replace(/"/g, '&quot;');
        return '<div>' +
            '<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">' + label + '</label>' +
            '<input type="' + type + '" id="' + id + '" value="' + escaped + '" ' + extra + ' class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">' +
            '</div>';
    }

    function _editSelect(label, id, options, selected) {
        let opts = '';
        options.forEach(function (o) {
            const val = typeof o === 'object' ? o.value : o;
            const text = typeof o === 'object' ? o.text : o;
            opts += '<option value="' + val + '" ' + (val === selected ? 'selected' : '') + '>' + text + '</option>';
        });
        return '<div>' +
            '<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">' + label + '</label>' +
            '<select id="' + id + '" class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white shadow-sm">' + opts + '</select>' +
            '</div>';
    }

    async function _syncUpdate(action, data, backendFn) {
        showSyncing(true);
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(function () { showSyncing(false); })[backendFn](data);
        } else if (GOOGLE_APPS_SCRIPT_URL) {
            try { await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: action, data: data }) }); } catch (e) { }
            showSyncing(false);
        } else {
            showSyncing(false);
        }
    }

    // ==========================================
    // EDIT TRANSACTION (Pemasukan / Pengeluaran)
    // ==========================================
    function editTransaction(id) {
        const trx = transactions.find(function (t) { return t.id === id; });
        if (!trx) return;

        const catList = trx.type === 'income' ? CATS_INCOME : CATS_EXPENSE;
        const catOptions = catList.map(function (c) { return { value: c, text: c }; });
        const bankOptions = banks.map(function (b) { return { value: b.id, text: b.name }; });

        const html =
            '<div class="grid grid-cols-2 gap-3">' +
            _editField('Nominal', 'edit-trx-amount', formatRp(trx.amount), 'text', 'oninput="formatCurrencyInput(this)"') +
            _editField('Tanggal', 'edit-trx-date', trx.date, 'date') +
            '</div>' +
            (trx.type === 'expense' ? _editField('Diskon / Hemat', 'edit-trx-discount', formatRp(trx.discount || 0), 'text', 'oninput="formatCurrencyInput(this)"') : '') +
            _editSelect('Kategori', 'edit-trx-category', catOptions, trx.category) +
            _editSelect('Akun', 'edit-trx-bank', bankOptions, trx.bank) +
            _editField('Keterangan', 'edit-trx-desc', trx.description || '');

        openEditModal(trx.type === 'income' ? 'Edit Pemasukan' : 'Edit Pengeluaran', html, async function () {
            trx.amount = cleanNumber(document.getElementById('edit-trx-amount').value);
            if (trx.type === 'expense') trx.discount = cleanNumber(document.getElementById('edit-trx-discount').value);
            trx.date = document.getElementById('edit-trx-date').value;
            trx.category = document.getElementById('edit-trx-category').value;
            trx.bank = document.getElementById('edit-trx-bank').value;
            trx.description = document.getElementById('edit-trx-desc').value;
            renderData();
            await _syncUpdate('update_transaction', trx, 'updateTransactionData');
        });
    }

    // ==========================================
    // EDIT BANK
    // ==========================================
    function editBank(id) {
        const bank = banks.find(function (b) { return b.id === id; });
        if (!bank) return;

        const acType = bank.account_type || 'bank';
        const isEwallet = acType === 'ewallet';
        const noLabel = isEwallet ? 'No HP' : 'No Rekening';

        let html = _editField('Nama', 'edit-bank-name', bank.name);
        if (acType !== 'cash') {
            html += _editField(noLabel, 'edit-bank-no', bank.account_number === '-' ? '' : bank.account_number);
        }
        html += _editField('Saldo Awal', 'edit-bank-balance', formatRp(bank.initial_balance), 'text', 'oninput="formatCurrencyInput(this)"');

        openEditModal('Edit Akun ' + bank.name, html, async function () {
            bank.name = document.getElementById('edit-bank-name').value;
            if (acType !== 'cash') {
                bank.account_number = document.getElementById('edit-bank-no').value || '-';
            }
            bank.initial_balance = cleanNumber(document.getElementById('edit-bank-balance').value);
            renderData();
            await _syncUpdate('update_bank', bank, 'updateBankData');
        });
    }

    async function loadData() {
        showSyncing(true);
        await loadBanks();
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(d => { transactions = d || []; renderData(); showSyncing(false); })
                .withFailureHandler(e => { console.error(e); showSyncing(false); })
                .getTransactionsData();
            return;
        }
        if (GOOGLE_APPS_SCRIPT_URL) {
            try {
                const url = GOOGLE_APPS_SCRIPT_URL.includes('?') ? GOOGLE_APPS_SCRIPT_URL : GOOGLE_APPS_SCRIPT_URL + '?api=true';
                const res = await fetch(url);
                transactions = await res.json();
            } catch (e) { transactions = JSON.parse(localStorage.getItem('keuangan_data') || '[]'); }
        } else {
            transactions = JSON.parse(localStorage.getItem('keuangan_data') || '[]');
        }
        transactions.sort((a, b) => {
            const dateDiff = new Date(b.date) - new Date(a.date);
            if (dateDiff !== 0) return dateDiff;
            return b.id.localeCompare(a.id); // Tie-breaker by ID (timestamp based)
        });
        renderData();
        showSyncing(false);
    }

    async function loadBanks() {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            return new Promise((resolve) => {
                google.script.run.withSuccessHandler(d => { banks = d || []; resolve(); })
                    .withFailureHandler(e => { console.error(e); resolve(); })
                    .getBanksData();
            });
        }
        if (GOOGLE_APPS_SCRIPT_URL) {
            try {
                const url = GOOGLE_APPS_SCRIPT_URL.includes('?') ? GOOGLE_APPS_SCRIPT_URL.replace('api=true', 'api=banks') : GOOGLE_APPS_SCRIPT_URL + '?api=banks';
                const res = await fetch(url);
                banks = await res.json();
            } catch (e) { banks = JSON.parse(localStorage.getItem('keuangan_banks') || '[{"id":"b1","name":"Dompet","initial_balance":0}]'); }
        } else {
            banks = JSON.parse(localStorage.getItem('keuangan_banks') || '[{"id":"b1","name":"Dompet","initial_balance":0}]');
        }
    }

    async function submitTransaction(e, type) {
        e.preventDefault();
        const prefix = type === 'income' ? 'inc' : 'exp';

        const trx = {
            id: 'txn_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 2),
            type: type,
            category: document.getElementById(`${prefix}-category`).value,
            amount: cleanNumber(document.getElementById(`${prefix}-amount`).value),
            discount: type === 'expense' ? cleanNumber(document.getElementById('exp-discount').value) : 0,
            date: document.getElementById(`${prefix}-date`).value,
            description: document.getElementById(`${prefix}-desc`).value,
            bank: document.getElementById(`${prefix}-bank`).value
        };

        transactions.unshift(trx);
        transactions.sort((a, b) => {
            const dateDiff = new Date(b.date) - new Date(a.date);
            if (dateDiff !== 0) return dateDiff;
            return b.id.localeCompare(a.id);
        });
        renderData();

        // Reset form
        document.getElementById(`${prefix}-amount`).value = '';
        if (type === 'expense') document.getElementById('exp-discount').value = '';
        document.getElementById(`${prefix}-desc`).value = '';

        showSyncing(true);
        if (typeof google !== 'undefined' && google.script && google.script.run) {

    async function submitQuickExpense(e) {
        e.preventDefault();

        const qtyInputs = document.querySelectorAll('.quick-exp-qty');
        const itemsToProcess = [];

        qtyInputs.forEach(input => {
            const qty = parseInt(input.value) || 0;
            if (qty > 0) {
                itemsToProcess.push({
                    data: JSON.parse(input.dataset.fc),
                    qty: qty
                });
            }
        });

        if (itemsToProcess.length === 0) {
            alert("Pilih minimal satu pengeluaran atau tambahkan jumlahnya!");
            return;
        }

        const bank = document.getElementById('quick-exp-bank').value;
        const date = document.getElementById('quick-exp-date').value;

        const newTransactions = [];
        itemsToProcess.forEach(item => {
            const { data, qty } = item;
            const totalAmount = data.amount * qty;
            const descSuffix = qty > 1 ? ` (x${qty})` : ''; // Tambahkan info (x2) jika lebih dari 1

            newTransactions.push({
                id: 'txn_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 3),
                type: 'expense',
                category: data.category,
                amount: totalAmount,
                date: date,
                description: data.name + descSuffix,
                bank: bank
            });
        });

        // Save locally immediately for fast UI response
        transactions = [...transactions, ...newTransactions];
        renderData();

        // Reset counters
        qtyInputs.forEach(input => {
            input.value = 0;
            document.getElementById(`qty-display-${input.dataset.id}`).innerText = '0';
        });

        showSyncing(true);

        // We submit them one by one for simplicity, or we could batch if backend supports it.
        // The backend `addTransactionData` currently accepts a single object, not an array.
        for (const txn of newTransactions) {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                await new Promise(resolve => {
                    google.script.run.withSuccessHandler(resolve).addTransactionData(txn);
                });
            } else if (GOOGLE_APPS_SCRIPT_URL) {
                try {
                    await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', data: txn }) });
                } catch (err) { }
            }
        }

        if (typeof google === 'undefined' && !GOOGLE_APPS_SCRIPT_URL) {
            localStorage.setItem('keuangan_data', JSON.stringify(transactions));
        }
        showSyncing(false);
    }

    function renderNativeCategoriesDropdowns() {
        const incEl = document.getElementById('inc-category');
        const expEl = document.getElementById('exp-category');
        const parentCatEl = document.getElementById('cat-parent');
        const fcCatEl = document.getElementById('fc-cat');
        const ecomCatEl = document.getElementById('ecom-category');
        const invCatEl = document.getElementById('inv-category');
        const invFilterCatEl = document.getElementById('inv-filter-cat');

        const generateHtml = (type) => {
            const parents = categoryList.filter(c => c.type === type && (!c.parent_id || c.parent_id === ''));
            let html = '';
            parents.forEach(p => {
                const children = categoryList.filter(c => c.parent_id === p.id);
                if (children.length > 0) {
                    // Parent as a bold-like header but still selectable
                    html += `<option value="${p.name}" class="font-bold bg-slate-100">● ${p.name.toUpperCase()}</option>`;
                    children.forEach(ch => {
                        html += `<option value="${p.name} - ${ch.name}">&nbsp;&nbsp;&nbsp;└─ ${ch.name}</option>`;
                    });
                    // Add separator for better spacing
                    html += `<option disabled>──────────</option>`;
                } else {
                    html += `<option value="${p.name}">${p.name}</option>`;
                }
            });
            if (html === '') html = '<option value="Lainnya">Lainnya</option>';
            return html;
        };

        if (incEl) incEl.innerHTML = generateHtml('income');
        if (expEl) expEl.innerHTML = generateHtml('expense');
        if (fcCatEl) fcCatEl.innerHTML = generateHtml('expense');
        if (ecomCatEl) ecomCatEl.innerHTML = generateHtml('expense');
        if (invCatEl) invCatEl.innerHTML = generateHtml('inventory');
        if (invFilterCatEl) invFilterCatEl.innerHTML = '<option value="all">Semua Kategori</option>' + generateHtml('inventory');

        if (parentCatEl) {
            let parentHtml = '<option value="">-- Kategori Utama --</option>';
            categoryList.filter(c => !c.parent_id).forEach(p => {
                parentHtml += `<option value="${p.id}">${p.name} (${p.type})</option>`;
            });
            parentCatEl.innerHTML = parentHtml;
        }
    }

    function renderCategoryList() {
        const listInc = document.getElementById('list-cats-income');
        const listExp = document.getElementById('list-cats-expense');
        const listInv = document.getElementById('list-cats-inventory');
        if (!listInc || !listExp || !listInv) return;

        const generateItem = (c, isSub = false) => {
            const typeColor = c.type === 'income' ? 'emerald' : c.type === 'expense' ? 'rose' : 'teal';
            return `
            <div class="flex items-center justify-between p-3 rounded-xl bg-white border border-slate-100 shadow-sm hover:shadow-md hover:border-${typeColor}-200 transition-all group ${isSub ? 'ml-6 border-l-4 border-l-' + typeColor + '-400' : ''}">
                <div class="flex items-center gap-3">
                    ${!isSub ? `<div class="w-2 h-2 rounded-full bg-${typeColor}-500"></div>` : ''}
                    <span class="text-sm font-bold text-slate-700 tracking-tight">${c.name}</span>
                </div>
                <button onclick="deleteCategory('${c.id}')" title="Hapus" class="p-1.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-all opacity-0 group-hover:opacity-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        `;
        };

        const renderListHtml = (type) => {
            let html = '';
            const parents = categoryList.filter(c => c.type === type && (!c.parent_id || c.parent_id === ''));
            if (parents.length === 0) return `<p class="text-center py-4 text-xs text-slate-400 italic">Belum ada kategori</p>`;

            parents.forEach(p => {
                html += generateItem(p);
                const children = categoryList.filter(c => c.parent_id === p.id);
                children.forEach(ch => {
                    html += generateItem(ch, true);
                });
            });
            return html;
        };

        listInc.innerHTML = renderListHtml('income');
        listExp.innerHTML = renderListHtml('expense');
        listInv.innerHTML = renderListHtml('inventory');
    }
