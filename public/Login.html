<!-- MODULE: LOGIN -->
<div id="view-login" class="view-module flex items-center justify-center min-h-screen bg-slate-50 z-50 fixed inset-0">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md text-center">
        <div class="w-16 h-16 bg-emerald-600 rounded-2xl mx-auto flex items-center justify-center shadow-emerald-200 shadow-lg mb-6 border-b-2 border-white/20">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Masuk ke Smart Wallet</h2>
        <p class="text-slate-500 text-sm mb-8">Silakan masukkan Username dan PIN Anda</p>
        
        <form onsubmit="handleLogin(event)" class="space-y-5 text-left">
            <div>
                <label for="login-user" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="login-user" required class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm">
            </div>
            <div>
                <label for="login-pin" class="block text-sm font-medium text-slate-700 mb-1">PIN</label>
                <input type="password" id="login-pin" required class="w-full rounded-xl border-slate-200 border p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm">
            </div>
            <div id="login-error" class="text-rose-500 text-sm hidden font-medium text-center">Username atau PIN salah!</div>
            <button type="submit" id="btn-login" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-white font-medium transition-all bg-emerald-600 hover:bg-emerald-700 shadow-md">
                <span>Masuk</span>
            </button>
        </form>
    </div>
</div>
