<script>
// ==========================================
// PORTOFOLIO MODULE - Deposito & Kripto
// ==========================================

let deposits = [];
let cryptos = [];

// --- LOAD ---
async function loadDeposits() {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        return new Promise(resolve => {
            google.script.run.withSuccessHandler(d => { deposits = d || []; resolve(); }).getDepositsData();
        });
    } else if (GOOGLE_APPS_SCRIPT_URL) {
        try {
            const res = await fetch(GOOGLE_APPS_SCRIPT_URL + "?api=deposits");
            deposits = await res.json();
        } catch(e) {
            deposits = JSON.parse(localStorage.getItem('keuangan_deposits') || '[]');
        }
    } else {
        deposits = JSON.parse(localStorage.getItem('keuangan_deposits') || '[]');
    }
}

async function loadCryptos() {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        return new Promise(resolve => {
            google.script.run.withSuccessHandler(d => { cryptos = d || []; resolve(); }).getCryptosData();
        });
    } else if (GOOGLE_APPS_SCRIPT_URL) {
        try {
            const res = await fetch(GOOGLE_APPS_SCRIPT_URL + "?api=cryptos");
            cryptos = await res.json();
        } catch(e) {
            cryptos = JSON.parse(localStorage.getItem('keuangan_cryptos') || '[]');
        }
    } else {
        cryptos = JSON.parse(localStorage.getItem('keuangan_cryptos') || '[]');
    }
}

async function loadPortfolio() {
    await loadDeposits();
    await loadCryptos();
    renderPortfolio();
}

// --- SUBMIT ---
async function submitDeposit(e) {
    e.preventDefault();
    const name = document.getElementById('depo-name').value;
    const bankId = document.getElementById('depo-bank').value;
    const amount = cleanNumber(document.getElementById('depo-amount').value);
    const rate = parseFloat(document.getElementById('depo-rate').value);
    const tenor = parseInt(document.getElementById('depo-tenor').value);
    const startDate = document.getElementById('depo-start').value;
    
    // Calculate maturity date
    const start = new Date(startDate);
    start.setMonth(start.getMonth() + tenor);
    const maturityDate = start.toISOString().split('T')[0];

    const depo = {
        id: 'depo_' + Date.now().toString(36),
        name,
        bank_id: bankId,
        amount,
        rate,
        tenor,
        start_date: startDate,
        maturity_date: maturityDate,
        status: 'active'
    };

    deposits.push(depo);
    
    // Create expense transaction from bank (uang keluar)
    const trxOut = {
        id: 'txn_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 2),
        type: 'expense',
        category: 'Deposito',
        amount: amount,
        date: startDate,
        description: 'Buka Deposito: ' + name,
        bank: bankId
    };
    transactions.unshift(trxOut);
    
    renderPortfolio();
    renderData();

    // Reset form
    document.getElementById('depo-name').value = '';
    document.getElementById('depo-amount').value = '';
    document.getElementById('depo-rate').value = '';
    document.getElementById('depo-tenor').value = '';

    showSyncing(true);
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.addTransactionData(trxOut);
        google.script.run.withSuccessHandler(() => showSyncing(false)).addDepositData(depo);
    } else if (GOOGLE_APPS_SCRIPT_URL) {
        try {
            await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', data: trxOut }) });
            await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add_deposit', data: depo }) });
        } catch(e){}
        showSyncing(false);
    } else {
        localStorage.setItem('keuangan_deposits', JSON.stringify(deposits));
        localStorage.setItem('keuangan_data', JSON.stringify(transactions));
        showSyncing(false);
    }
}

async function submitCrypto(e) {
    e.preventDefault();
    const name = document.getElementById('crypto-name').value;
    const qty = parseFloat(document.getElementById('crypto-qty').value);
    const value = cleanNumber(document.getElementById('crypto-value').value);

    const crypto = {
        id: 'cry_' + Date.now().toString(36),
        name,
        quantity: qty,
        value_idr: value
    };

    cryptos.push(crypto);
    renderPortfolio();

    // Reset
    document.getElementById('crypto-name').value = '';
    document.getElementById('crypto-qty').value = '';
    document.getElementById('crypto-value').value = '';

    showSyncing(true);
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(() => showSyncing(false)).addCryptoData(crypto);
    } else if (GOOGLE_APPS_SCRIPT_URL) {
        try {
            await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add_crypto', data: crypto }) });
        } catch(e){}
        showSyncing(false);
    } else {
        localStorage.setItem('keuangan_cryptos', JSON.stringify(cryptos));
        showSyncing(false);
    }
}

// --- DELETE ---
async function deleteDeposit(id) {
    if (!confirm("Hapus deposito ini? Dana akan dikembalikan ke saldo bank.")) return;
    
    const depo = deposits.find(d => d.id === id);
    if (depo) {
        // Return money to bank account (uang masuk kembali)
        const trxIn = {
            id: 'txn_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 2),
            type: 'income',
            category: 'Pencairan Deposito',
            amount: Number(depo.amount),
            date: new Date().toISOString().split('T')[0],
            description: 'Pencairan: ' + depo.name,
            bank: depo.bank_id
        };
        transactions.unshift(trxIn);
        renderData();
        
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.addTransactionData(trxIn);
        } else if (GOOGLE_APPS_SCRIPT_URL) {
            try { await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', data: trxIn }) }); } catch(e){}
        } else {
            localStorage.setItem('keuangan_data', JSON.stringify(transactions));
        }
    }
    
    deposits = deposits.filter(d => d.id !== id);
    renderPortfolio();
    
    showSyncing(true);
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(() => showSyncing(false)).deleteDepositData(id);
    } else if (GOOGLE_APPS_SCRIPT_URL) {
        try { await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete_deposit', id }) }); } catch(e){}
        showSyncing(false);
    } else {
        localStorage.setItem('keuangan_deposits', JSON.stringify(deposits));
        showSyncing(false);
    }
}

async function deleteCrypto(id) {
    if (!confirm("Hapus aset kripto ini?")) return;
    cryptos = cryptos.filter(c => c.id !== id);
    renderPortfolio();

    showSyncing(true);
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(() => showSyncing(false)).deleteCryptoData(id);
    } else if (GOOGLE_APPS_SCRIPT_URL) {
        try { await fetch(GOOGLE_APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete_crypto', id }) }); } catch(e){}
        showSyncing(false);
    } else {
        localStorage.setItem('keuangan_cryptos', JSON.stringify(cryptos));
        showSyncing(false);
    }
}

// --- RENDER ---
function renderPortfolio() {
    // Pengaman: Pastikan variabel adalah Array agar tidak error
    if (!Array.isArray(banks)) banks = [];
    if (!Array.isArray(deposits)) deposits = [];
    if (!Array.isArray(cryptos)) cryptos = [];

    // Bank dropdown for deposito
    const depoBankEl = document.getElementById('depo-bank');
    if (depoBankEl) {
        let opts = '<option value="">Pilih Akun Bank...</option>';
        banks.forEach(b => { opts += `<option value="${b.id}">${b.name}</option>`; });
        depoBankEl.innerHTML = opts;
    }

    // Summary totals
    let totalDepo = 0, totalCrypto = 0;
    deposits.forEach(d => totalDepo += Number(d.amount) || 0);
    cryptos.forEach(c => totalCrypto += Number(c.value_idr) || 0);

    const depoTotalEl = document.getElementById('port-total-depo');
    const cryptoTotalEl = document.getElementById('port-total-crypto');
    const allTotalEl = document.getElementById('port-total-all');
    if (depoTotalEl) depoTotalEl.innerText = formatRp(totalDepo);
    if (cryptoTotalEl) cryptoTotalEl.innerText = formatRp(totalCrypto);
    if (allTotalEl) allTotalEl.innerText = formatRp(totalDepo + totalCrypto);

    // Update dashboard asset card & breakdowns
    const dashAssetEl = document.getElementById('dash-total-assets');
    const dashBreakdownDepoEl = document.getElementById('dash-breakdown-depo');
    const dashBreakdownCryptoEl = document.getElementById('dash-breakdown-crypto');
    if (dashAssetEl) dashAssetEl.innerText = formatRp(totalDepo + totalCrypto);
    if (dashBreakdownDepoEl) dashBreakdownDepoEl.innerText = formatRp(totalDepo);
    if (dashBreakdownCryptoEl) dashBreakdownCryptoEl.innerText = formatRp(totalCrypto);

    // Render deposit list
    const listDepoEl = document.getElementById('list-deposits');
    const depoBadge = document.getElementById('depo-count-badge');
    if (depoBadge) depoBadge.innerText = deposits.length + ' Deposito';

    if (listDepoEl) {
        if (deposits.length === 0) {
            listDepoEl.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">Belum ada deposito.</p>';
        } else {
            listDepoEl.innerHTML = deposits.map(d => {
                const bankName = banks.find(b => b.id === d.bank_id)?.name || 'N/A';
                const daysLeft = Math.ceil((new Date(d.maturity_date) - new Date()) / (1000 * 60 * 60 * 24));
                const isNear = daysLeft <= 30 && daysLeft > 0;
                const isExpired = daysLeft <= 0;
                const statusBadge = isExpired 
                    ? '<span class="text-[10px] font-bold bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full">Jatuh Tempo!</span>'
                    : isNear
                    ? `<span class="text-[10px] font-bold bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full">${daysLeft} hari lagi</span>`
                    : `<span class="text-[10px] font-bold bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded-full">${daysLeft} hari lagi</span>`;

                const grossInterest = Math.round(Number(d.amount) * (Number(d.rate) / 100) * (Number(d.tenor) / 12));
                const isTaxed = Number(d.amount) > 7500000;
                const netInterest = isTaxed ? Math.round(grossInterest * 0.8) : grossInterest;
                
                return `
                <div class="p-4 rounded-xl border ${isExpired ? 'border-rose-200 bg-rose-50/50' : isNear ? 'border-amber-200 bg-amber-50/30' : 'border-slate-100 bg-white'} hover:shadow-md transition-all group">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="p-2 rounded-lg ${isExpired ? 'bg-rose-100 text-rose-600' : 'bg-violet-100 text-violet-600'}">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-slate-800">${d.name}</p>
                                <p class="text-xs text-slate-400">${bankName} • ${d.rate}% p.a. • ${d.tenor} bulan</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="editDeposit('${d.id}')" title="Edit Deposito" class="p-1.5 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="deleteDeposit('${d.id}')" title="Cairkan Deposito" class="p-1.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Pokok</p>
                            <p class="text-sm font-bold text-slate-800">${formatRp(d.amount)}</p>
                        </div>
                        <div title="${isTaxed ? 'Sudah dipotong pajak 20%' : 'Bebas pajak'}">
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Est. Bunga ${isTaxed ? '<span class="text-rose-500 font-bold">*</span>' : ''}</p>
                            <p class="text-sm font-bold text-emerald-600">+${formatRp(netInterest)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Jatuh Tempo</p>
                            <p class="text-xs font-semibold text-slate-600">${d.maturity_date}</p>
                            ${statusBadge}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    }

    // Render crypto list
    const listCryptoEl = document.getElementById('list-cryptos');
    const cryptoBadge = document.getElementById('crypto-count-badge');
    if (cryptoBadge) cryptoBadge.innerText = cryptos.length + ' Aset';

    if (listCryptoEl) {
        if (cryptos.length === 0) {
            listCryptoEl.innerHTML = '<p class="text-slate-400 text-center py-8 text-sm">Belum ada aset kripto.</p>';
        } else {
            listCryptoEl.innerHTML = cryptos.map(c => `
                <div class="p-4 rounded-xl border border-slate-100 hover:shadow-md transition-all group bg-white">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="p-2 rounded-lg bg-amber-100 text-amber-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-slate-800">${c.name}</p>
                                <p class="text-xs text-slate-400">${c.quantity} unit</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <p class="font-bold text-sm text-slate-800">${formatRp(c.value_idr)}</p>
                            <button onclick="editCrypto('${c.id}')" title="Edit Aset" class="p-1.5 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="deleteCrypto('${c.id}')" title="Hapus Aset" class="p-1.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    // Render reminders (deposito maturing within 30 days)
    const reminderSection = document.getElementById('depo-reminders-section');
    const reminderList = document.getElementById('list-depo-reminders');
    if (reminderSection && reminderList) {
        const soon = deposits.filter(d => {
            const daysLeft = Math.ceil((new Date(d.maturity_date) - new Date()) / (1000 * 60 * 60 * 24));
            return daysLeft <= 30;
        });
        if (soon.length > 0) {
            reminderSection.classList.remove('hidden');
            reminderList.innerHTML = soon.map(d => {
                const daysLeft = Math.ceil((new Date(d.maturity_date) - new Date()) / (1000 * 60 * 60 * 24));
                const isExpired = daysLeft <= 0;
                return `
                <div class="p-3 rounded-xl ${isExpired ? 'bg-rose-100 border border-rose-300' : 'bg-white border border-amber-200'} flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">${isExpired ? '🔴' : '🟡'}</span>
                        <div>
                            <p class="text-sm font-bold ${isExpired ? 'text-rose-800' : 'text-amber-800'}">${d.name}</p>
                            <p class="text-xs ${isExpired ? 'text-rose-600' : 'text-amber-600'}">Jatuh tempo: ${d.maturity_date}</p>
                        </div>
                    </div>
                    <span class="text-sm font-bold ${isExpired ? 'text-rose-700' : 'text-amber-700'}">${isExpired ? 'JATUH TEMPO!' : daysLeft + ' hari lagi'}</span>
                </div>`;
            }).join('');
        } else {
            reminderSection.classList.add('hidden');
        }
    }
}

// ==========================================
// EDIT DEPOSITO
// ==========================================
function editDeposit(id) {
    const d = deposits.find(function(x) { return x.id === id; });
    if (!d) return;

    const bankOptions = banks.map(function(b) { return { value: b.id, text: b.name }; });

    const html =
        _editField('Nama Deposito', 'edit-depo-name', d.name) +
        _editSelect('Dari Akun Bank', 'edit-depo-bank', bankOptions, d.bank_id) +
        _editField('Nominal', 'edit-depo-amount', formatRp(d.amount), 'text', 'oninput="formatCurrencyInput(this)"') +
        '<div class="grid grid-cols-2 gap-3">' +
            _editField('Bunga (%/thn)', 'edit-depo-rate', d.rate, 'number', 'step="0.01"') +
            _editField('Tenor (Bulan)', 'edit-depo-tenor', d.tenor, 'number') +
        '</div>' +
        '<div class="grid grid-cols-2 gap-3">' +
            _editField('Tanggal Mulai', 'edit-depo-start', d.start_date, 'date') +
            _editField('Jatuh Tempo', 'edit-depo-maturity', d.maturity_date, 'date') +
        '</div>';

    openEditModal('Edit Deposito: ' + d.name, html, async function() {
        d.name = document.getElementById('edit-depo-name').value;
        d.bank_id = document.getElementById('edit-depo-bank').value;
        d.amount = cleanNumber(document.getElementById('edit-depo-amount').value);
        d.rate = parseFloat(document.getElementById('edit-depo-rate').value);
        d.tenor = parseInt(document.getElementById('edit-depo-tenor').value);
        d.start_date = document.getElementById('edit-depo-start').value;
        d.maturity_date = document.getElementById('edit-depo-maturity').value;
        renderPortfolio();
        await _syncUpdate('update_deposit', d, 'updateDepositData');
    });
}

// ==========================================
// EDIT KRIPTO
// ==========================================
function editCrypto(id) {
    const c = cryptos.find(function(x) { return x.id === id; });
    if (!c) return;

    const html =
        _editField('Nama Koin / Token', 'edit-crypto-name', c.name) +
        '<div class="grid grid-cols-2 gap-3">' +
            _editField('Jumlah Unit', 'edit-crypto-qty', c.quantity, 'number', 'step="0.00000001"') +
            _editField('Nilai Total (IDR)', 'edit-crypto-value', formatRp(c.value_idr), 'text', 'oninput="formatCurrencyInput(this)"') +
        '</div>';

    openEditModal('Edit Kripto: ' + c.name, html, async function() {
        c.name = document.getElementById('edit-crypto-name').value;
        c.quantity = parseFloat(document.getElementById('edit-crypto-qty').value);
        c.value_idr = cleanNumber(document.getElementById('edit-crypto-value').value);
        renderPortfolio();
        await _syncUpdate('update_crypto', c, 'updateCryptoData');
    });
}
</script>
